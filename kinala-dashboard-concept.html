    function OutcomesTrendChart() {
      const w = 640;
      const h = 280;
      const pad = { t: 28, r: 24, b: 40, l: 48 };
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;
      const pts = [
        [0, 0.62],
        [1, 0.58],
        [2, 0.64],
        [3, 0.55],
        [4, 0.52],
        [5, 0.48],
        [6, 0.44],
        [7, 0.41],
        [8, 0.38],
        [9, 0.36],
        [10, 0.33],
        [11, 0.31],
      ];
      const toX = (i) => pad.l + (i / (pts.length - 1)) * innerW;
      const toY = (v) => pad.t + v * innerH;
      const d = pts
        .map(([i, v], idx) => `${idx === 0 ? 'M' : 'L'} ${toX(i).toFixed(1)} ${toY(v).toFixed(1)}`)
        .join(' ');
      const areaD = `${d} L ${toX(pts.length - 1)} ${pad.t + innerH} L ${toX(0)} ${pad.t + innerH} Z`;
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      return (
        <div className="rounded-xl border border-line bg-surface p-5 shadow-sm">
          <div className="flex flex-wrap items-start justify-between gap-4">
            <div className="flex min-w-0 gap-3">
              <span className="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-md border border-line bg-cream text-icon-fg">
                <IconTrendingUp />
              </span>
              <div className="min-w-0">
                <h2 className="text-[15px] font-semibold tracking-sans text-ink">Maternal Outcomes Trend</h2>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <button
                type="button"
                className="inline-flex items-center gap-1.5 rounded-md border border-line bg-cream px-2 py-1 text-[11px] font-medium text-muted"
              >
                <span className="h-2 w-5 rounded-full bg-rust/80" aria-hidden="true" />
                Index
              </button>
              <button
                type="button"
                className="inline-flex items-center gap-1.5 rounded-md border border-line bg-cream px-2 py-1 text-[11px] font-medium text-muted"
              >
                <span className="h-2 w-5 rounded-full bg-gold/70" aria-hidden="true" />
                Target corridor
              </button>
              <span className="hidden h-6 w-px bg-line sm:block" aria-hidden="true" />
              <button
                type="button"
                className="hidden h-8 w-8 items-center justify-center rounded-md border border-line text-icon-fg hover:bg-wash sm:inline-flex"
                aria-label="Chart actions (preview)"
              >
                <IconLink />
              </button>
            </div>
          </div>
          <div className="mt-6 overflow-x-auto">
            <svg viewBox={`0 0 ${w} ${h}`} className="h-auto w-full min-w-[520px]" role="img" aria-label="Line chart showing improving maternal outcomes index over twelve months">
              {[0, 0.25, 0.5, 0.75, 1].map((t) => (
                <line
                  key={t}
                  x1={pad.l}
                  x2={w - pad.r}
                  y1={pad.t + t * innerH}
                  y2={pad.t + t * innerH}
                  stroke="#E8DFD2"
                  strokeWidth="1"
                />
              ))}
              <rect
                x={pad.l}
                y={pad.t + innerH * 0.28}
                width={innerW}
                height={innerH * 0.18}
                fill="#E8DFD2"
                rx="4"
              />
              <path d={areaD} fill="#B45A32" fillOpacity="0.14" />
              <path d={d} fill="none" stroke="#B45A32" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round" />
              {pts.map(([i, v]) => (
                <circle key={i} cx={toX(i)} cy={toY(v)} r="3.5" fill="#FBF8F3" stroke="#B45A32" strokeWidth="2" />
              ))}
              {months.map((m, i) => (
                <text
                  key={m}
                  x={toX(i)}
                  y={h - 12}
                  textAnchor="middle"
                  className="fill-muted font-sans text-[10px] tracking-sans"

              <text

                y={pad.t + 4}
                textAnchor="end"
                className="fill-muted font-sans text-[10px] tracking-sans"
              >
                Better ↑
              </text>
            </svg>
          </div>
        </div>
      );
    }

          </div>
          <div className="rounded-xl border border-line bg-surface p-5 shadow-sm">
            <div className="flex items-start gap-3">
              <span className="flex h-9 w-9 shrink-0 items-center justify-center rounded-md border border-line bg-cream text-icon-fg">
                <IconUsers />
              </span>
              <h3 className="text-[17px] font-semibold leading-snug text-ink">Aligned incentives, shared telemetry</h3>
            </div>
            <p className="mt-3 text-[13px] leading-relaxed text-muted">
              Ministry dashboards, NGO field teams, and device OEMs see the same adherence spine — anonymized where
              required, actionable where it matters.
            </p>
            <dl className="mt-5 grid grid-cols-2 gap-3">
              <div className="rounded-lg border border-line bg-cream p-3">
                <dt className="flex items-center gap-1.5 text-[12px] font-medium text-muted">
                  <IconUsers className="h-3.5 w-3.5 text-icon-fg" />
                  Active partners
                </dt>
                <dd className="mt-2 text-2xl font-semibold tabular-nums text-ink">18</dd>
              </div>
              <div className="rounded-lg border border-line bg-cream p-3">
                <dt className="flex items-center gap-1.5 text-[12px] font-medium text-muted">
                  <IconBuilding className="h-3.5 w-3.5 text-icon-fg" />
                  Co-funded sites
                </dt>
                <dd className="mt-2 text-2xl font-semibold tabular-nums text-ink">64</dd>
              </div>
              <div className="rounded-lg border border-rust/15 bg-blush/40 p-3 sm:col-span-2">
                <dt className="flex items-center gap-1.5 text-[12px] font-medium text-muted">
                  <IconTarget className="h-3.5 w-3.5 text-rust" />
                  Joint OKR
                </dt>
                <dd className="mt-2 text-[13px] font-medium leading-snug text-ink">
                  Reduce median time-to-intervention across cohort by 15% before Q4 — on track at 11 min.
                </dd>
              </div>
            </dl>
          </div>
        </div>
      );
    }

    function TopBar({
      mobileNavOpen,
      onOpenMenu,
      onOpenRisk,
      range,
      onRangeChange,
      region,
      onRegionChange,
    }) {
      return (
        <header className="flex min-h-12 flex-wrap items-center gap-2 border-b border-line bg-surface px-3 py-1.5 sm:gap-3 sm:px-4">
          <div className="flex min-w-0 flex-1 items-center gap-2 sm:gap-2.5">
            <button
              type="button"
              className="flex h-9 w-9 shrink-0 items-center justify-center rounded-md border border-line text-icon-fg transition-colors hover:bg-wash hover:text-ink lg:hidden"
              onClick={onOpenMenu}
              aria-label="Open navigation"
              aria-expanded={mobileNavOpen}
            >
              <IconMenu className="h-4 w-4" />
            </button>
            <div
              className="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-rust text-cream sm:hidden"
              aria-hidden="true"
            >
              <KinalaLogoMark className="h-4 w-4" />
            </div>
            <KinalaLockup
              className="hidden h-5 w-auto max-w-[min(104px,26vw)] shrink-0 text-ink sm:block"
              title="Kinala"
            />
            <a
              href="kinala-ui-foundations.html"
              className="ml-auto shrink-0 rounded-md border border-line bg-cream px-2.5 py-1.5 text-[12px] font-semibold text-rust transition-colors hover:bg-wash hover:text-rust-deep sm:ml-0 sm:border-transparent sm:bg-transparent sm:pl-3 sm:border-l sm:border-line"
            >
              UI Foundations
            </a>
          </div>
          <button
            type="button"
            onClick={onOpenRisk}
            className="inline-flex h-9 shrink-0 items-center gap-1.5 rounded-md border border-line bg-cream px-2.5 text-[12px] font-semibold text-ink hover:bg-wash lg:hidden"
            aria-label="Open regional risk panel"
          >
            <IconMapPin className="h-4 w-4 text-icon-fg" />
            Risk
          </button>
          <div className="flex min-w-0 flex-wrap items-center justify-end gap-2">
            <div className="flex min-w-0 flex-[1_1_240px] items-center gap-1.5 sm:flex-initial sm:gap-2">
              <StyledSelect
                label="Range"
                value={range}
                onChange={onRangeChange}
                options={RANGE_OPTIONS}
                IconGlyph={IconCalendar}
              />
              <StyledSelect
                label="Region"
                value={region}
                onChange={onRegionChange}
                options={REGION_OPTIONS}
                IconGlyph={IconMapPin}
              />
            </div>
            <button
              type="button"
              className="rounded-lg bg-rust px-3 py-2 text-[13px] font-semibold text-cream transition-colors hover:bg-rust-deep sm:py-1.5"
            >
              Export
            </button>
            <button
              type="button"
              className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full border border-line bg-cream shadow-sm transition-colors hover:border-rust/35"
              aria-label="Account (preview)"
            >
              <span className="flex h-7 w-7 items-center justify-center rounded-full bg-rust text-[10px] font-bold text-cream">
                AM
              </span>
            </button>
          </div>
        </header>
      );
    }

    function App() {
      const [mobileNavOpen, setMobileNavOpen] = useState(false);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(() => {
        try {
          return window.localStorage.getItem('kinala-sidebar-collapsed') === '1';
        } catch {
          return false;
        }
      });
      const [riskDrawerOpen, setRiskDrawerOpen] = useState(false);
      const [range, setRange] = useState('90 days');
      const [region, setRegion] = useState('East Africa');

      useEffect(() => {
        try {
          window.localStorage.setItem('kinala-sidebar-collapsed', sidebarCollapsed ? '1' : '0');
        } catch {
          /* ignore */
        }
      }, [sidebarCollapsed]);

      useEffect(() => {
        const mq = window.matchMedia('(min-width: 1024px)');
        const onChange = () => {
          if (mq.matches) {
            setMobileNavOpen(false);
            setRiskDrawerOpen(false);
          }
        };
        mq.addEventListener('change', onChange);
        return () => mq.removeEventListener('change', onChange);
      }, []);

      useEffect(() => {
        if (!mobileNavOpen && !riskDrawerOpen) return undefined;
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.body.style.overflow = prev;
        };
      }, [mobileNavOpen, riskDrawerOpen]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'Escape') {
            setMobileNavOpen(false);
            setRiskDrawerOpen(false);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="relative min-h-screen">
          {mobileNavOpen && (
            <button
              type="button"
              className="fixed inset-0 z-30 bg-ink/30 lg:hidden"
              aria-label="Close navigation"
              onClick={() => setMobileNavOpen(false)}
            />
          )}
          <div className="flex min-h-screen">
            <Sidebar
              mobileOpen={mobileNavOpen}
              onClose={() => setMobileNavOpen(false)}
              collapsed={sidebarCollapsed}
              onToggleCollapsed={() => setSidebarCollapsed((c) => !c)}
            />
            <div className="flex min-h-screen min-w-0 flex-1 flex-col bg-cream">
              <TopBar
                mobileNavOpen={mobileNavOpen}
                onOpenMenu={() => setMobileNavOpen(true)}
                onOpenRisk={() => setRiskDrawerOpen(true)}
                range={range}
                onRangeChange={setRange}
                region={region}
                onRegionChange={setRegion}
              />
              <div className="flex min-h-0 flex-1">
                <main className="min-h-0 flex-1 overflow-y-auto">
                  <div className="mx-auto max-w-[1100px] space-y-7 px-4 py-6 sm:px-5 sm:py-8 lg:px-8 lg:py-9">
                  <header className="max-w-3xl">
                    <h1 className="font-serif tracking-serif text-[1.85rem] font-normal leading-[1.12] text-ink sm:text-[2.15rem] lg:text-5xl">
                      From evidence to action
                    </h1>
                    <p className="mt-3 max-w-2xl text-[14px] leading-relaxed text-muted sm:mt-4 sm:text-[15px]">
                      Maternal health implementation, adherence, and outcomes in one place.
                    </p>
                  </header>

                  <section className="grid gap-3 sm:grid-cols-2 xl:grid-cols-4" aria-label="Key metrics">
                    <KpiCard
                      label="Lives impacted"
                      value="14,400"
                      hint="Rolling cohort · verified encounters"
                      accent="bg-rust"
                      IconGlyph={IconActivity}
                    />
                    <KpiCard
                      label="Protocol adherence rate"
                      value="82%"
                      hint="+4 pts vs prior quarter"
                      accent="bg-gold"
                      IconGlyph={IconClipboard}
                    />
                    <KpiCard
                      label="Avg intervention time"
                      value="11 min"
                      hint="Median across escalations"
                      accent="bg-rust/70"
                      IconGlyph={IconClock}
                    />
                    <KpiCard
                      label="Facilities requiring attention"
                      value="37"
                      hint="Threshold: under 78% adherence or 3d+ signal lag"
                      accent="bg-gold/80"
                      IconGlyph={IconCircleDashed}
                    />
                  </section>

                  <section>
                    <OutcomesTrendChart />
                  </section>

                  <section className="grid gap-5 lg:grid-cols-[1.12fr_0.88fr] lg:items-start">
                    <FacilityTable />
                    <InsightStack />
                  </section>

                  <section>
                    <BottomModules />
                  </section>

                  <footer className="border-t border-line pt-5 text-center text-[11px] text-muted">
                    <a
                      href="kinala-ui-foundations.html"
                      className="font-semibold text-rust underline-offset-2 hover:underline"
                    >
                      UI Foundations
                    </a>
                    <span className="mx-1.5 text-line-strong" aria-hidden="true">
                      ·
                    </span>
                    Concept preview · not production software
                  </footer>
                  </div>
                </main>
                <div className="sticky top-0 hidden h-screen min-h-0 w-[min(300px,32vw)] max-w-[320px] shrink-0 lg:block">
                  <RegionalRiskPanel titleId="risk-panel-desktop-title" />
                </div>
              </div>
            </div>
          </div>
          {riskDrawerOpen && (
            <>
              <button
                type="button"
                className="fixed inset-0 z-40 bg-ink/35 lg:hidden"
                aria-label="Close regional risk"
                onClick={() => setRiskDrawerOpen(false)}
              />
              <div
                className="fixed inset-x-0 bottom-0 z-50 flex max-h-[min(92vh,900px)] min-h-0 flex-col overflow-hidden rounded-t-2xl border border-line bg-surface pb-[env(safe-area-inset-bottom)] shadow-lift lg:hidden"
                role="dialog"
                aria-modal="true"
                aria-labelledby="risk-panel-drawer-title"
              >
                <div className="flex shrink-0 justify-center pt-2 pb-1" aria-hidden="true">
                  <span className="h-1 w-10 rounded-full bg-line" />
                </div>
                <RegionalRiskPanel
                  titleId="risk-panel-drawer-title"
                  onClose={() => setRiskDrawerOpen(false)}
                />
              </div>
            </>
          )}
          {!riskDrawerOpen && (
            <button
              type="button"
              onClick={() => setRiskDrawerOpen(true)}
              className="fixed bottom-4 right-4 z-20 flex min-h-[48px] items-center gap-2 rounded-full bg-rust px-4 py-3 text-[13px] font-semibold text-cream shadow-lg transition hover:bg-rust-deep lg:hidden"
              aria-label="Open regional risk panel"
            >
              <IconMapPin className="h-4 w-4" />
              Regional risk
            </button>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
